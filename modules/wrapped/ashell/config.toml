log_level = "warn"
outputs = "All"
position = "Top"
layer = "Top"
# app_launcher_cmd = "walker"

[modules]
left = [ [ "Workspaces" ] ]
center = [ "Tempo" ]
right = [ "SystemInfo", "Tray", [ "Notifications", "Privacy", "Settings" ] ]

[system_info]
indicators = [ "Memory", "MemorySwap" ]
[system_info.disk]
format = "Fraction"

[tray]
right_click = "Menu"

[media_player]
max_title_length = 50

[workspaces]
enable_workspace_filling = false
visibility_mode = "MonitorSpecificExclusive"

[tempo]
weather_location = { City = "Darmstadt" }
weather_indicator = "None"
timezones = [ "Europe/Berlin", "Japan" ]

[window_title]
truncate_title_after_length = 100

[settings]
lock_cmd = "playerctl --all-players pause; loginctl lock-session"
audio_sinks_more_cmd = "pwvucontrol -t 1"
audio_sources_more_cmd = "pwvucontrol -t 2"
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
bluetooth_more_cmd = "blueman"
indicators = ["IdleInhibitor", "PowerProfile", "Audio", "Bluetooth", "Network", "Vpn", "Battery"]

[osd]
enabled = true   # Disabled by default; set to true to enable the OSD overlay
timeout = 1500   # Auto-hide delay in milliseconds
show_volume_percentage = true    # Show percentage text next to volume/mic bar
show_brightness_percentage = true # Show percentage text next to brightness bar

[animations]
enabled = true

[notifications]
show_bodies = false
grouped = true
toast_timeout = 2000

[appearance]
style = "Solid"
font_name = "Adwaita Sans"

success_color = "#a6e3a1"
text_color = "#cdd6f4"

workspace_colors = [ "#b4befe" ]

[appearance.primary_color]
base = "#b4befe"
text = "#181825"

[appearance.danger_color]
base = "#f38ba8"
weak = "#f9e2af"

[appearance.background_color]
base = "#181825"
weak = "#313244"
strong = "#45475a"

[appearance.secondary_color]
base = "#181825"
strong = "#1e1e2e"
